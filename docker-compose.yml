services:
  postgres:
    image: postgres:16-alpine
    container_name: orbitfinc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orbitfinc
      POSTGRES_PASSWORD: orbitfinc
      POSTGRES_DB: orbitfinc
    ports:
      - "5434:5432"
    volumes:
      - orbitfinc_postgres_data:/var/lib/postgresql/data

volumes:
  orbitfinc_postgres_data:
